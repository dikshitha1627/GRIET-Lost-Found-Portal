<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GRIET Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container auth-wrapper">
        <div class="card">
            <h2>GRIET Lost & Found</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Account Sign In</p>
            <input type="email" id="loginEmail" placeholder="College Email ID">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
            <p>New User? <a href="register.html">Register Account</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
